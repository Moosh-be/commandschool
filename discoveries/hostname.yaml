title: "hostname — Le nom de ton ordinateur sur le réseau"
category: "Identité"
level: 1
platform: windows

command: "hostname"
command_title: "Commande"

what_you_see: |
  Une seule ligne : le nom de l'ordinateur.

  Exemple :
    PC-CHLOE-11

  Avec le paramètre /all :
    Host Name . . . . . . . . . . : PC-CHLOE-11
    DNS Suffix . . . . . . . . . . : domaineschool.local
    Search Suffixes. . . . . . . : domaineschool.local, internal.domaineschool.com

explanation: |
  "PC-CHLOE-11" n'est pas juste un nom affiché dans les propriétés
  du système. C'est l'identifiant que ton ordinateur utilise pour
  communiquer sur le réseau.

  Quand tu partages un fichier, imprimes, ou te connectes à un
  serveur, Windows utilise ce nom. Le DNS le traduit en adresse
  IP pour que les autres appareils te trouvent.

  Dans une entreprise, le nom suit souvent un format standard :
    - PC-nom-prenom-numéro
    - WORKSTATION-dept-numéro
    - OU-NumeroDeMachine

  Ce format standard permet à l'IT de savoir :
    - Quel département (le préfixe OU ou dept)
    - Quel utilisateur (le prénom dans le nom)
    - Quel numéro de machine (pour le suivi)

real_world_use_cases:
  - text: |
      **Partage de fichiers entre ordinateurs**
      Tu dois taper le nom de l'ordinateur de ton collègue pour
      accéder à ses dossiers. hostname te rappelle comment on
      appelle ton propre PC depuis le réseau.
    example: "\\PC-CHLOE-11\dossier-partage"
  - text: |
      **Un ticket IT demande "le nom de la machine"**
      hostname te le donne instantanément. Inutile de chercher
      dans les paramètres.
    example: "hostname > C:\\temp\\mon-ordi.txt"
  - text: |
      **Le nom de ton ordinateur ne correspond pas à ce que tu attends**
      hostname révèle le nom réel. Parfois il est "USER-PC" par défaut
      et non "USER-Nom" comme espéré. C'est un problème si ton
      entreprise a un format standard.
    example: "hostname /all"
  - text: |
      **hostname /all révèle le DNS suffix**
      Si tu travailles sur un ordinateur de domaine, le DNS suffix
      (domaineschool.local) te dit dans quel domaine Windows te
      cherche automatiquement.
    example: "hostname /f"

go_deeper:
  - "hostname /all — Voir le nom complet avec DNS suffix"
  - "hostname /f — Afficher le nom de domaine complet"
  - "Get-ComputerInfo | Select CsName — Alternative PowerShell"
  - "systeminfo | findstr /B /C:\"Nom de l'hôte\" — Alternative via systeminfo"

related_commands:
  - "hostname /all"
  - "hostname /f"
  - "Get-ComputerInfo | Select CsName"
  - "systeminfo | findstr \"Nom de l'hôte\""
