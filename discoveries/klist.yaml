# =============================================================================
# Discovery : klist
# Catégorie : Authentification
# Niveau : 2 (intermédiaire)
# Plateforme : Windows
# =============================================================================

title: "klist — Les tickets Kerberos de ta session"
category: "Authentification"
level: 2
platform: windows

command: "klist tickets"
command_title: "Commande"

what_you_see: |
  Une liste de tickets Kerberos avec :
    - Type : le type de ticket (krbtgt, krbtgt/...)
    - Principal : le service pour lequel le ticket a été obtenu
    - StartTime : date et heure d'obtention
    - EndTime : date et heure d'expiration
    - RenewUntil : date de renouvellement possible

  Exemple :
    TicketType  : krbtgt/DOMAINSCHOOL.LOCAL@DOMAINSCHOOL.LOCAL
    StartTime   : 20/07/2025 08:30:15
    EndTime     : 20/07/2025 18:30:15
    RenewUntil  : 27/07/2025 08:30:15

explanation: |
  Chaque fois que tu te connectes à ton ordinateur ou que tu
  accèdes à une ressource réseau, Windows obtient un "ticket"
  Kerberos. Ce ticket est ton passeport temporaire pour accéder
  aux services.

  Kerberos est le protocole d'authentification par défaut dans
  les environnements Windows Active Directory. Il fonctionne par
  tickets chiffrés, et chaque ticket a une durée de vie limitée.

  Pourquoi c'est important : quand un ticket expire, tu dois
  te reconnecter. Quand un ticket est corrompu, une application
  plante. Quand un ticket est trop ancien, un serveur le rejette.

  Savoir que ces tickets existent et quand ils expirent explique
  beaucoup de problèmes d'accès "qui apparaissent sans raison".

real_world_use_cases:
  - text: |
      **L'accès à un partage réseau plante après le déjeuner**
      Le ticket Kerberos a expiré (généralement 10 heures).
      klist montre que le ticket est périmé. Se déconnecter/reconnecter
      ou taper "net refresh" obtient un nouveau ticket.
    example: "klist purge"
  - text: |
      **Power BI Desktop ne se connecte pas à SharePoint**
      Le ticket d'authentification est peut-être expiré ou corrompu.
      klist permet de vérifier les tickets actifs et leurs dates.
    example: "klist /li 0x3e7 /q"
  - text: |
      **L'accès SSO à un portail d'entreprise ne fonctionne plus**
      Le ticket Kerberos pour ce service spécifique peut être absent.
      klist /li 0x3e7 /q montre les tickets du contexte de session.
    example: "klist sessions"
  - text: |
      **Le changement de mot de passe ne se répercute pas immédiatement**
      Les anciens tickets Kerberos restent valides jusqu'à expiration.
      klist permet de visualiser ce décalage.
    example: "klist purge"

go_deeper:
  - "klist sessions — Voir toutes les sessions avec tickets actifs"
  - "klist tickets — Voir les tickets de la session actuelle"
  - "klist /li 0x3e7 /q — Voir les tickets du contexte de session courant"
  - "klist purge — Supprimer tous les tickets (force une nouvelle authentification)"

related_commands:
  - "klist sessions"
  - "klist purge"
  - "klist /li 0x3e7 /q"
  - "klist cache"
